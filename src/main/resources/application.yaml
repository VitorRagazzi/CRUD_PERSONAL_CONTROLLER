spring:
  application:
    name: personalcontroller

  datasource:
    url: jdbc:sqlite:personalcontroller.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: br.com.crud.personalcontroller.config.SQLiteDialect

server:
  port: 8082