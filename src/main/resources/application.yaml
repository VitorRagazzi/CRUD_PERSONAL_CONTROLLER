spring:
  application:
    name: personalcontroller

  datasource:
    url: jdbc:sqlite:personalcontroller.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.community.dialect.SQLiteDialect

server:
  port: 8082
  error:
    include-message: always